<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ginny | Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#F5F1E8; /* Dirty white / cream */
    padding:30px;
}

.card{
    width:100%;
    max-width:420px;
    background:#ffffff;
    border-radius:28px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #E8DFD2;
    margin-bottom:18px;
}

h1{
    font-size:30px;
    color:#4A403A;
    margin-bottom:8px;
}

p{
    color:#777;
    margin-bottom:25px;
}

.link{
    display:block;
    text-decoration:none;
    color:#4A403A;
    background:#EFE8DE;
    padding:16px;
    margin:14px 0;
    border-radius:16px;
    font-weight:600;
    transition:.25s;
}

.link:hover{
    background:#DCCFC0;
    transform:translateY(-3px);
}

.socials{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:25px;
    font-size:28px;
}

.socials a{
    text-decoration:none;
    transition:.25s;
}

.socials a:hover{
    transform:scale(1.2);
}

footer{
    margin-top:25px;
    color:#999;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<img src="profile.jpg" class="avatar" alt="Ginny">

<h1>Ginny</h1>

<p>Welcome to my official links 🤍</p>

<a class="link" href="https://slt.bio/ginnyvibe">🌐 Official Website</a>

<a class="link" href="#">📸 Instagram</a>

<a class="link" href="#">🎵 TikTok</a>

<a class="link" href="#">📘 Facebook</a>

<a class="link" href="#">💌 Contact Me</a>

<div class="socials">
<a href="#">📷</a>
<a href="#">🎵</a>
<a href="#">📘</a>
</div>


</div>

</body>
</html>
