<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ginny • Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f0eb;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 420px;
      margin: 40px auto;
      background: white;
      border-radius: 28px;
      padding: 40px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      text-align: center;
    }
    .profile {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #f5f0eb;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      object-fit: cover;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      font-weight: 700;
      color: #2c2c2c;
    }
    .subtitle {
      color: #666;
      font-size: 17px;
      margin-bottom: 35px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffc1d8;
      color: #2c2c2c;
      text-decoration: none;
      padding: 17px 20px;
      margin: 10px auto;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 17px;
      width: 88%;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: white;
      color: #2c2c2c;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 193, 216, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.imgur.com/yXGqE5O.png" alt="Ginny" class="profile">
    <h1> Redhead Ginny</h1>
    <p class="subtitle">Welcome to my official links ♡</p>

    <a href="http://link.me/ginnyvibe" class="btn"><i class="fa-solid fa-globe"></i> Official Website 🤍💙</a>
    <a href="https://www.instagram.com/favoriteging/" class="btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
    <a href="https://vt.tiktok.com/ZSXUp51Gk/" class="btn"><i class="fa-brands fa-tiktok"></i> TikTok</a>
    <a href="https://x.com/muffyredhead?s=21" class="btn"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a>
  </div>
</body>
</html>
